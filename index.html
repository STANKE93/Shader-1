<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Shadez</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas {
        display: block;
        position: fixed;
        top: 12px; left: 12px;
        width: calc(100vw - 12px - 353px);
        height: calc(100vh - 24px);
        border-radius: 16px;
      }
      .cs-app-frame {
        position: fixed;
        z-index: 50;
        pointer-events: none;
        border: none;
        border-radius: 16px;
        box-shadow: inset 0 0 60px rgba(0,0,0,0.15);
        /* Initial fallback; overridden by resizeCanvas() in scene.js */
        top: 12px; left: 12px; bottom: 12px; right: 353px;
      }
      .cs-frame-corner {
        position: absolute; width: 16px; height: 16px;
        pointer-events: none;
      }
      .cs-frame-corner::before, .cs-frame-corner::after {
        content: ''; position: absolute; background: rgba(255,255,255,0.0);
      }
      .cs-frame-corner::before { width: 16px; height: 1px; }
      .cs-frame-corner::after  { width: 1px; height: 16px; }
      .cs-frame-corner.tl { top: -1px; left: -1px; }
      .cs-frame-corner.tl::before { top: 0; left: 0; }
      .cs-frame-corner.tl::after  { top: 0; left: 0; }
      .cs-frame-corner.tr { top: -1px; right: -1px; }
      .cs-frame-corner.tr::before { top: 0; right: 0; }
      .cs-frame-corner.tr::after  { top: 0; right: 0; }
      .cs-frame-corner.bl { bottom: -1px; left: -1px; }
      .cs-frame-corner.bl::before { bottom: 0; left: 0; }
      .cs-frame-corner.bl::after  { bottom: 0; left: 0; }
      .cs-frame-corner.br { bottom: -1px; right: -1px; }
      .cs-frame-corner.br::before { bottom: 0; right: 0; }
      .cs-frame-corner.br::after  { bottom: 0; right: 0; }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
