<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Shadez</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      .cs-app-frame {
        position: fixed; inset: 0; z-index: 50;
        pointer-events: none;
        border: 1.5px solid rgba(240,200,0,0.18);
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.9);
      }
      .cs-app-frame::before {
        content: ''; position: absolute; inset: 0;
        border: 1px solid rgba(240,200,0,0.06);
        margin: 6px;
      }
      .cs-frame-corner {
        position: absolute; width: 18px; height: 18px;
        pointer-events: none;
      }
      .cs-frame-corner::before, .cs-frame-corner::after {
        content: ''; position: absolute; background: rgba(240,200,0,0.45);
      }
      .cs-frame-corner::before { width: 18px; height: 1.5px; }
      .cs-frame-corner::after  { width: 1.5px; height: 18px; }
      .cs-frame-corner.tl { top: 0; left: 0; }
      .cs-frame-corner.tl::before { top: 0; left: 0; }
      .cs-frame-corner.tl::after  { top: 0; left: 0; }
      .cs-frame-corner.tr { top: 0; right: 0; }
      .cs-frame-corner.tr::before { top: 0; right: 0; }
      .cs-frame-corner.tr::after  { top: 0; right: 0; }
      .cs-frame-corner.bl { bottom: 0; left: 0; }
      .cs-frame-corner.bl::before { bottom: 0; left: 0; }
      .cs-frame-corner.bl::after  { bottom: 0; left: 0; }
      .cs-frame-corner.br { bottom: 0; right: 0; }
      .cs-frame-corner.br::before { bottom: 0; right: 0; }
      .cs-frame-corner.br::after  { bottom: 0; right: 0; }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
